version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - '4200:4200'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - '3000:3000'
    environment:
      MONGO_URI: mongodb://mongo:27017/drapp
      JWT_SECRET: change-me
      WEB_ORIGIN: http://localhost:4200
      SMS_PROVIDER: log
      S3_REGION: us-east-1
      S3_BUCKET: clinic-docs
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      - mongo
      - minio

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  mongo-data:
  minio-data:
